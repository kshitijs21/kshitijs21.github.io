<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kshitij Sinha – Mathematics, IIT Bombay</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500&family=Noto+Sans+Devanagari:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #1c1a17;
    --ink-muted: #6b6760;
    --ink-faint: #a8a49e;
    --bg: #f7f5f0;
    --bg-warm: #efebd8;
    --bg-card: #faf9f6;
    --accent: #2d5a8e;
    --accent-light: #dde8f4;
    --accent-dark: #1a3e66;
    --rule: #d8d3c7;
    --gold: #a07a30;
    --gold-light: #f5edd8;
    --serif: 'EB Garamond', Georgia, serif;
    --mono: 'DM Mono', monospace;
    --sans: 'Outfit', sans-serif;
  }

  html, body { height: 100%; }

  body {
    font-family: var(--serif);
    background: var(--bg);
    color: var(--ink);
    font-size: 18px;
    line-height: 1.75;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  /* ── NAV ── */
  nav {
    position: sticky; top: 0; z-index: 100;
    background: rgba(247,245,240,0.95);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--rule);
    padding: 0 3rem;
    display: flex; align-items: center; justify-content: space-between;
    height: 56px; flex-shrink: 0;
  }
  .nav-brand {
    font-family: var(--mono); font-size: 13px; color: var(--ink-muted);
    letter-spacing: 0.04em; cursor: pointer; transition: color 0.2s;
    background: none; border: none;
  }
  .nav-brand:hover { color: var(--accent); }
  .nav-links { display: flex; gap: 0; list-style: none; }
  .nav-links button {
    font-family: var(--sans); font-size: 13px; font-weight: 400;
    color: var(--ink-muted); background: none; border: none; cursor: pointer;
    letter-spacing: 0.06em; text-transform: uppercase;
    padding: 0 1.2rem; height: 56px; transition: color 0.2s; position: relative;
  }
  .nav-links button::after {
    content: ''; position: absolute; bottom: 0;
    left: 1.2rem; right: 1.2rem; height: 2px;
    background: var(--accent); transform: scaleX(0); transition: transform 0.25s;
  }
  .nav-links button:hover { color: var(--accent); }
  .nav-links button.active { color: var(--accent); }
  .nav-links button.active::after { transform: scaleX(1); }

  /* ── PAGE CONTAINER ── */
  #page-container {
    flex: 1;
    animation: fadeIn 0.28s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── SHARED ── */
  .page-inner {
    max-width: 960px; margin: 0 auto; padding: 4rem 3rem 6rem;
  }
  .section-header {
    display: flex; align-items: baseline; gap: 1.5rem; margin-bottom: 3rem;
  }
  .section-num {
    font-family: var(--mono); font-size: 11px; color: var(--gold);
    letter-spacing: 0.1em; flex-shrink: 0;
  }
  .section-title {
    font-family: var(--serif); font-size: 1.9rem; font-weight: 500;
    letter-spacing: -0.01em; color: var(--ink);
  }
  .section-rule { flex: 1; height: 1px; background: var(--rule); margin-left: 0.5rem; }

  /* ── HOME ── */
  .hero {
    display: grid; grid-template-columns: 1fr 1fr;
    min-height: calc(100vh - 56px);
  }
  .hero-left {
    padding: 6rem 4rem 6rem 6rem;
    display: flex; flex-direction: column; justify-content: center;
    border-right: 1px solid var(--rule); position: relative;
  }
  .hero-left::before {
    content: ''; position: absolute; top: 4rem; left: 6rem;
    width: 48px; height: 2px; background: var(--gold);
  }
  .hero-label {
    font-family: var(--mono); font-size: 11px; color: var(--gold);
    letter-spacing: 0.14em; text-transform: uppercase;
    margin-bottom: 2rem; margin-top: 3rem;
  }
  .hero-name {
    font-size: clamp(2.8rem, 5vw, 4.5rem); font-weight: 500;
    line-height: 1.1; letter-spacing: -0.01em; margin-bottom: 1.5rem; color: var(--ink);
  }
  .hero-name em { display: block; font-style: italic; color: var(--accent); }
  .hero-desc {
    font-size: 1.05rem; color: var(--ink-muted); max-width: 460px;
    line-height: 1.8; margin-bottom: 2.5rem;
  }
  .hero-actions { display: flex; gap: 1rem; flex-wrap: wrap; }
  .btn-primary {
    font-family: var(--sans); font-size: 13px; font-weight: 500;
    letter-spacing: 0.08em; text-transform: uppercase; padding: 10px 24px;
    background: var(--accent); color: #fff; border: none; cursor: pointer;
    transition: background 0.2s;
  }
  .btn-primary:hover { background: var(--accent-dark); }
  .btn-ghost {
    font-family: var(--sans); font-size: 13px; font-weight: 400;
    letter-spacing: 0.08em; text-transform: uppercase; padding: 10px 24px;
    background: transparent; color: var(--ink-muted); border: 1px solid var(--rule);
    cursor: pointer; transition: border-color 0.2s, color 0.2s;
  }
  .btn-ghost:hover { border-color: var(--ink-muted); color: var(--ink); }
  .hero-right {
    display: flex; flex-direction: column; justify-content: flex-end;
    padding: 6rem 4rem; background: var(--bg-warm); position: relative; overflow: hidden;
  }
  .hero-right::before {
    content: '∂'; position: absolute; top: -40px; right: -20px;
    font-size: 340px; color: rgba(163,139,88,0.08); font-family: var(--serif);
    line-height: 1; pointer-events: none;
  }
  .affil-block { margin-bottom: 1rem; }
  .affil-name {
    font-family: var(--sans); font-size: 0.9rem; color: var(--ink-muted); font-weight: 300;
  }

  /* ── ABOUT ── */
  .about-grid { display: grid; grid-template-columns: 3fr 2fr; gap: 5rem; align-items: start; }
  .about-text { font-size: 1.05rem; color: var(--ink); line-height: 1.9; }
  .about-text p + p { margin-top: 1.2rem; }
  .sidebar-label {
    font-family: var(--sans); font-size: 11px; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--gold);
    margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--rule);
  }
  .interest-list { list-style: none; display: flex; flex-direction: column; gap: 0.75rem; }
  .interest-list li {
    font-family: var(--sans); font-size: 0.9rem; color: var(--ink-muted);
    display: flex; align-items: center; gap: 0.75rem;
    padding: 0.75rem 1rem; background: var(--bg-card); border: 1px solid var(--rule);
    transition: border-color 0.2s, color 0.2s;
  }
  .interest-list li:hover { border-color: var(--accent); color: var(--ink); }
  .interest-list li::before {
    content: '→'; font-family: var(--mono); font-size: 12px; color: var(--accent); flex-shrink: 0;
  }

  /* ── EDUCATION ── */
  .edu-timeline { display: flex; flex-direction: column; position: relative; padding-left: 2.5rem; }
  .edu-timeline::before {
    content: ''; position: absolute; left: 0; top: 8px; bottom: 8px;
    width: 1px; background: var(--rule);
  }
  .edu-item { position: relative; padding: 2rem 0 2rem 2.5rem; border-bottom: 1px solid var(--rule); }
  .edu-item:last-child { border-bottom: none; }
  .edu-item::before {
    content: ''; position: absolute; left: -4.5px; top: 2.5rem;
    width: 9px; height: 9px; border-radius: 50%;
    background: var(--bg); border: 1.5px solid var(--accent);
  }
  .edu-deg { font-size: 1.15rem; font-weight: 500; color: var(--ink); margin-bottom: 0.2rem; }
  .edu-inst { font-family: var(--sans); font-size: 0.9rem; color: var(--accent); margin-bottom: 0.25rem; }
  .edu-year { font-family: var(--mono); font-size: 11px; color: var(--ink-faint); letter-spacing: 0.06em; }

  /* ── PUBLICATIONS ── */
  .pub-list { display: flex; flex-direction: column; gap: 1.5rem; }
  .pub-card {
    display: grid; grid-template-columns: auto 1fr; gap: 2rem; align-items: start;
    padding: 2rem; background: var(--bg-card); border: 1px solid var(--rule);
    border-left: 3px solid var(--accent); transition: border-left-color 0.2s, transform 0.2s;
  }
  .pub-card:hover { border-left-color: var(--gold); transform: translateX(4px); }
  .pub-index { font-family: var(--mono); font-size: 13px; color: var(--ink-faint); padding-top: 2px; }
  .pub-title { font-family: var(--serif); font-size: 1.05rem; font-weight: 500; color: var(--ink); line-height: 1.5; margin-bottom: 0.4rem; }
  .pub-meta { font-family: var(--sans); font-size: 0.82rem; color: var(--ink-muted); margin-bottom: 0.4rem; }
  .pub-badge {
    display: inline-block; font-family: var(--mono); font-size: 10px;
    letter-spacing: 0.08em; text-transform: uppercase; padding: 2px 8px; margin-right: 6px;
  }
  .badge-accepted { background: #ddf0e4; color: #1d6b3e; }
  .badge-preprint { background: var(--gold-light); color: var(--gold); }
  .pub-link { font-family: var(--mono); font-size: 11px; color: var(--accent); text-decoration: none; letter-spacing: 0.04em; }
  .pub-link:hover { text-decoration: underline; }

  /* ── ACTIVITIES ── */
  .activities-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5rem; }
  .activity-col-title {
    font-family: var(--sans); font-size: 11px; font-weight: 500;
    letter-spacing: 0.12em; text-transform: uppercase; color: var(--gold);
    margin-bottom: 1.5rem; padding-bottom: 0.75rem; border-bottom: 1px solid var(--rule);
  }
  .activity-items { display: flex; flex-direction: column; gap: 1.5rem; }
  .activity-item { padding-left: 1rem; border-left: 2px solid var(--rule); transition: border-left-color 0.2s; }
  .activity-item:hover { border-left-color: var(--accent); }
  .activity-title { font-family: var(--serif); font-size: 0.95rem; font-weight: 500; color: var(--ink); margin-bottom: 0.2rem; line-height: 1.4; }
  .activity-org { font-family: var(--sans); font-size: 0.8rem; color: var(--ink-muted); margin-bottom: 0.2rem; }
  .activity-date { font-family: var(--mono); font-size: 10px; color: var(--ink-faint); letter-spacing: 0.06em; }

  /* ── TEACHING ── */
  .teaching-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 1.5rem; }
  .course-card {
    background: var(--bg-card); border: 1px solid var(--rule); padding: 1.75rem;
    display: flex; flex-direction: column; gap: 0.5rem;
    transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
  }
  .course-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.06); border-color: var(--accent); }
  .course-code { font-family: var(--mono); font-size: 12px; color: var(--accent); letter-spacing: 0.06em; }
  .course-name { font-family: var(--serif); font-size: 1.1rem; font-weight: 500; color: var(--ink); line-height: 1.3; }
  .course-sem { font-family: var(--sans); font-size: 11px; color: var(--ink-faint); margin-top: 0.25rem; }

  /* ── CONTACT ── */
  .contact-box { max-width: 600px; }
  .contact-text { font-size: 1rem; color: var(--ink-muted); line-height: 1.8; margin-bottom: 2.5rem; }
  .contact-items { display: flex; flex-direction: column; gap: 0; }
  .contact-row {
    display: flex; gap: 2rem; align-items: center;
    font-family: var(--sans); font-size: 0.9rem;
    padding: 1rem 0; border-bottom: 1px solid var(--rule);
  }
  .contact-row:first-child { border-top: 1px solid var(--rule); }
  .contact-key {
    font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em;
    color: var(--ink-faint); text-transform: uppercase; min-width: 70px;
  }
  .contact-val { color: var(--ink); }
  .contact-val a { color: var(--accent); text-decoration: none; }
  .contact-val a:hover { text-decoration: underline; }
  .cv-download {
    margin-top: 2rem; display: inline-flex; align-items: center; gap: 0.5rem;
    font-family: var(--sans); font-size: 13px; letter-spacing: 0.08em; text-transform: uppercase;
    color: #fff; background: var(--accent); padding: 12px 28px;
    text-decoration: none; border: none; cursor: pointer; transition: background 0.2s;
  }
  .cv-download:hover { background: var(--accent-dark); }

  /* ── FOOTER ── */
  footer {
    padding: 1.5rem 3rem; display: flex; align-items: center; justify-content: space-between;
    border-top: 1px solid var(--rule); flex-shrink: 0;
  }
  footer p { font-family: var(--sans); font-size: 12px; color: var(--ink-faint); }

  /* ── MOBILE ── */
  @media (max-width: 860px) {
    nav { padding: 0 1rem; }
    .nav-links button { padding: 0 0.5rem; font-size: 11px; }
    .hero { grid-template-columns: 1fr; min-height: auto; }
    .hero-left { padding: 4rem 1.5rem; border-right: none; border-bottom: 1px solid var(--rule); }
    .hero-left::before { left: 1.5rem; }
    .hero-right { padding: 3rem 1.5rem; min-height: 280px; }
    .page-inner { padding: 3rem 1.5rem 5rem; }
    .about-grid { grid-template-columns: 1fr; gap: 2.5rem; }
    .activities-grid { grid-template-columns: 1fr; gap: 2.5rem; }
    footer { padding: 1.5rem; flex-direction: column; gap: 0.5rem; text-align: center; }
  }
</style>
</head>
<body>

<nav>
  <button class="nav-brand" onclick="showPage('home')">K. Sinha</button>
  <ul class="nav-links">
    <li><button onclick="showPage('about')"        data-page="about">About</button></li>
    <li><button onclick="showPage('education')"    data-page="education">Education</button></li>
    <li><button onclick="showPage('publications')" data-page="publications">Research</button></li>
    <li><button onclick="showPage('activities')"   data-page="activities">Activities</button></li>
    <li><button onclick="showPage('teaching')"     data-page="teaching">Teaching</button></li>
    <li><button onclick="showPage('contact')"      data-page="contact">Contact</button></li>
  </ul>
</nav>

<div id="page-container"></div>

<footer>
  <p>Kshitij Sinha — Department of Mathematics, IIT Bombay</p>
  <p>PhD Researcher · Homogenization Theory · PDEs</p>
</footer>

<script>
  // Maps nav id → file in pages/
  const pages = {
    home:         'pages/home.html',
    about:        'pages/about.html',
    education:    'pages/education.html',
    publications: 'pages/research.html',
    activities:   'pages/activities.html',
    teaching:     'pages/teaching.html',
    contact:      'pages/contact.html',
  };

  const cache = {};

  async function showPage(id) {
    // Update nav highlight
    document.querySelectorAll('.nav-links button').forEach(b => b.classList.remove('active'));
    const btn = document.querySelector(`[data-page="${id}"]`);
    if (btn) btn.classList.add('active');

    // Fetch and inject content (cache after first load)
    const container = document.getElementById('page-container');
    if (!cache[id]) {
      const res = await fetch(pages[id]);
      cache[id] = await res.text();
    }
    container.innerHTML = cache[id];

    // Re-trigger fade animation
    container.style.animation = 'none';
    container.offsetHeight; // reflow
    container.style.animation = '';

    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  // Load home on first visit
  showPage('home');
</script>
</body>
</html>
